name: Skill Curation

on:
  pull_request:
    paths:
      - 'skills/**'
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  curate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find changed skills
        id: changed
        run: |
          CHANGED_SKILLS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'skills/' \
            | grep -oP 'skills/[^/]+' \
            | sort -u \
            || true)

          echo "skills<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_SKILLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_SKILLS" ]; then
            echo "No skills changed, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate skills
        if: steps.changed.outputs.skip == 'false'
        run: |
          while IFS= read -r skill_dir; do
            if [ -n "$skill_dir" ] && [ -d "$skill_dir" ]; then
              echo "Validating $skill_dir..."
              node scripts/verify-skill-structure.mjs "$skill_dir"
            fi
          done <<< "${{ steps.changed.outputs.skills }}"

      - name: Generate PR comments
        if: steps.changed.outputs.skip == 'false'
        id: comment
        run: |
          COMMENT=""
          while IFS= read -r skill_dir; do
            if [ -n "$skill_dir" ] && [ -d "$skill_dir" ]; then
              SKILL_COMMENT=$(node scripts/generate-skill-pr-comment.js "$skill_dir" 2>/dev/null || echo "Could not parse $skill_dir")
              COMMENT="${COMMENT}${SKILL_COMMENT}\n\n"
            fi
          done <<< "${{ steps.changed.outputs.skills }}"

          echo -e "$COMMENT" > /tmp/pr-comment.md

      - name: Post PR comment
        if: steps.changed.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/pr-comment.md', 'utf-8').trim();

            if (!comment) {
              console.log('No comment to post');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && (c.body.includes('Skill Review') || c.body.includes('Amendment to'))
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
